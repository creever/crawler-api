version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: crawler-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-crawler}
    ports:
      - "9090:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Crawler API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crawler-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongo:27017/${MONGO_DB:-crawler}?authSource=admin
      MONGO_DB: ${MONGO_DB:-crawler}
      SERVER_PORT: ${SERVER_PORT:-8080}
      GIN_MODE: ${GIN_MODE:-release}
      # Restrict CORS origins for production: CORS_ORIGINS=https://your-ui.example.com
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  mongo_data:
